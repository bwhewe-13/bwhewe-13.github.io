name: rl-python
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # PyTorch (CPU build by default; swap pytorch-cuda for GPU)
  - pytorch>=2.3
  - torchvision
  - torchaudio
  - cpuonly                   # remove this line and add pytorch-cuda=12.1 for GPU
  
  - pygame>=2.6

  - pip:
    - gymnasium>=1.0.0
    - ale-py>=0.10
    - pettingzoo>=1.25.0
    - stable-baselines3>=2.7.0
    - sb3-contrib>=2.7.0
    - "ray[rllib]>=2.54.0"
    - mlflow>=2.14.0

    - supersuit>=3.9.0         # wrappers for PettingZoo + SB3
    - shimmy>=1.3.0            # Gymnasium compatibility shims
    - tensorboard>=2.17
    - numpy>=1.26
    - matplotlib>=3.9
